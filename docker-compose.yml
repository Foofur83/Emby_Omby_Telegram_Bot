version: '3.8'

version: '3.8'

services:
  emby-app:
    build: .
    container_name: emby-app
    restart: unless-stopped
    # Start both the web UI and the Telegram bot in one container.
    # Using a simple shell command to background the web UI process.
    command: sh -c "python web_ui.py & python bot.py"
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./templates:/app/templates
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - default

networks:
  default:
    driver: bridge