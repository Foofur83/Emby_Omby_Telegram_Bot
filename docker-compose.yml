version: '3.8'

services:
  emby-bot:
    build: .
    container_name: telegram-emby-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - default

  web-ui:
    build: .
    container_name: emby-bot-webui
    restart: unless-stopped
    command: python web_ui.py
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./templates:/app/templates
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - default

networks:
  default:
    driver: bridge
