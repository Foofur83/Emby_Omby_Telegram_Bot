version: '3.8'

services:
  emby-app:
    build: .
    container_name: emby-app
    restart: unless-stopped
    # Supervisord will start both the web UI and the Telegram bot
    ports:
      - "5000:5000"
    volumes:
      - config_data:/app/config    # named volume: stores config inside Docker (no host path required)
      - data:/app/data             # named volume for persistent data
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  config_data:
  data: