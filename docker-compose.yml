version: '3.8'

version: '3.8'

services:
  emby-app:
    build: .
    container_name: emby-app
    restart: unless-stopped
    # Supervisord will start both the web UI and the Telegram bot
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config    # mount a directory, not a file — app will auto-create config/config.yaml
      - ./templates:/app/templates
    environment:
      - TZ=Europe/Amsterdam
    networks:
      - default

networks:
  default:
    driver: bridge