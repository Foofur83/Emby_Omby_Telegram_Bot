{% extends 'base.html' %}

{% block title %}Configuratie - Emby Bot{% endblock %}

{% block content %}
<div class="card">
    <h2>⚙️ Bot Configuratie</h2>
    <form method="POST">
        <div class="form-group">
            <label for="telegram_token">Telegram Bot Token</label>
            <input type="text" id="telegram_token" name="telegram_token" value="{{ config.telegram_token }}" required>
        </div>
        
        <div class="form-group">
            <label for="admin_telegram_id">Admin Telegram ID</label>
            <input type="number" id="admin_telegram_id" name="admin_telegram_id" value="{{ config.admin_telegram_id }}" required>
        </div>
        
        <h3 style="color: #3b82f6; margin: 30px 0 20px 0;">Ombi Instellingen</h3>
        
        <div class="form-group">
            <label for="ombi_url">Ombi URL</label>
            <input type="text" id="ombi_url" name="ombi_url" value="{{ config.ombi_url }}" placeholder="http://192.168.1.5:3579" required>
        </div>
        
        <div class="form-group">
            <label for="ombi_api_key">Ombi API Key</label>
            <input type="text" id="ombi_api_key" name="ombi_api_key" value="{{ config.ombi_api_key }}" required>
        </div>
        
        <div class="form-group">
            <label for="ombi_api_key_header">Ombi API Key Header</label>
            <input type="text" id="ombi_api_key_header" name="ombi_api_key_header" value="{{ config.ombi_api_key_header }}" placeholder="ApiKey" required>
        </div>
        
        <h3 style="color: #3b82f6; margin: 30px 0 20px 0;">Emby Instellingen</h3>
        
        <div class="form-group">
            <label for="emby_url">Emby URL</label>
            <input type="text" id="emby_url" name="emby_url" value="{{ config.emby_url }}" placeholder="http://192.168.1.2:8096" required>
        </div>
        
        <div class="form-group">
            <label for="emby_api_key">Emby API Key</label>
            <input type="text" id="emby_api_key" name="emby_api_key" value="{{ config.emby_api_key }}" required>
        </div>
        
        <h3 style="color: #3b82f6; margin: 30px 0 20px 0;">Overige</h3>
        
        <div class="form-group">
            <label for="poll_interval_seconds">Poll Interval (seconden)</label>
            <input type="number" id="poll_interval_seconds" name="poll_interval_seconds" value="{{ config.poll_interval_seconds }}" min="10" required>
        </div>
        
        <button type="submit">💾 Opslaan</button>
    </form>
</div>
{% endblock %}
